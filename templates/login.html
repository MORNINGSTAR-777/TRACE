<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACE — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/main.css">
<style>
  body { background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #f0fdf4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; padding: 24px; }
  .auth-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); width: 100%; max-width: 420px; overflow: hidden; }
  .auth-header { background: linear-gradient(135deg, #0f1724 0%, #1a2744 100%); padding: 36px 32px; text-align: center; }
  .auth-logo-mark { width: 52px; height: 52px; background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: white; margin-bottom: 12px; }
  .auth-title { font-size: 22px; font-weight: 700; color: white; letter-spacing: 2px; }
  .auth-subtitle { font-size: 12px; color: #94a3b8; margin-top: 4px; letter-spacing: 0.5px; }
  .auth-body { padding: 32px; }
  .auth-body h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #1a202c; }
  .auth-body p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .demo-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #1d4ed8; }
  .demo-box strong { display: block; margin-bottom: 4px; }
  .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .auth-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
  .btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo-mark">T</div>
      <div class="auth-title">TRACE</div>
      <div class="auth-subtitle">Timeline & Record Analysis Contradiction Engine</div>
    </div>
    <div class="auth-body">
      <h2>Welcome back</h2>
      <p>Sign in to your investigator account</p>
      <div class="demo-box">
        <strong>🔑 Demo Access</strong>
        Email: demo@trace.gov &nbsp;|&nbsp; Password: demo123
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="investigator@trace.gov" value="demo@trace.gov">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" value="demo123">
      </div>
      <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> <span id="errorText"></span></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
      <div class="auth-link">Don't have an account? <a href="/register">Register</a></div>
    </div>
  </div>
</div>
<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showError('Please fill in all fields.'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.innerHTML = '<span class="loader"></span> Signing in...';
  btn.disabled = true;
  const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
  const data = await res.json();
  if (data.success) { window.location.href = '/dashboard'; }
  else { showError(data.error || 'Login failed'); btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false; }
}
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').style.display = 'flex';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
